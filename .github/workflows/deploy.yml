name: Auto Deployment to Host

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Custom Addons via Cloudflare Tunnel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel Client (cloudflared)
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH and Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Configure SSH to use cloudflared as a ProxyCommand for the host
          cat <<EOF > ~/.ssh/config
          Host ssh-erp.26i.uk
              ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Copy Addons to Server via SCP
        run: |
          # Copy the directories using scp through the tunnel
          scp -r debrand_retail_marketplace disable_odoo_online portal_odoo_debranding remove_odoo_enterprise ${{ secrets.SSH_USERNAME }}@ssh-erp.26i.uk:${{ secrets.DEPLOY_PATH }}

      - name: Restart Odoo Service and Update Modules
        run: |
          # SSH into the server through the tunnel to restart Odoo
          ssh ${{ secrets.SSH_USERNAME }}@ssh-erp.26i.uk "sudo systemctl restart odoo"
